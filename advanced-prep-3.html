<script>
// AIF-C01 Prep — Set 3 (Expert · Applied ML & LLM scenarios)
// Original scenario-first MCQs, blueprint-weighted. Foundational depth (selection/application/trade-offs).
// Distractors length-matched; answer positions balanced across A-D. Unique from Sets 1 & 2.
// domains: 1=Fundamentals AI/ML, 2=Fundamentals GenAI, 3=Applications of FMs, 4=Responsible AI, 5=Security/Compliance/Governance
window.AIF_BANK_SET3 = [
 {
  "d": 1,
  "q": "A team must predict next month's revenue as a continuous dollar amount from historical sales features. Which category of ML algorithm fits this problem?",
  "o": [
   "A regression algorithm, which predicts a continuous numeric target from input features",
   "A classification algorithm, which assigns each input to one of several discrete labels",
   "A clustering algorithm, which groups unlabeled records by similarity without a target",
   "A reinforcement algorithm, which learns a policy of actions by maximizing a reward signal"
  ],
  "a": 0,
  "e": "Predicting a continuous number (dollar amount) is a regression task. Classification produces discrete labels, clustering finds groups in unlabeled data, and reinforcement learning optimizes sequential actions via rewards — none predict a continuous value."
 },
 {
  "d": 1,
  "q": "A model separates customers into 'will churn' vs 'will not churn.' The business cares most about catching as many true churners as possible, even at the cost of some false alarms. Which metric should they prioritize?",
  "o": [
   "Precision, which measures how many predicted churners were actually churners",
   "Recall, which measures how many actual churners the model successfully caught",
   "Training accuracy, which measures performance on the data used to fit the model",
   "Inference latency, which measures how quickly the model returns each prediction"
  ],
  "a": 1,
  "e": "Catching as many actual churners as possible is recall (true positives found ÷ all actual positives). Precision optimizes the opposite trade-off (avoiding false alarms), training accuracy can be misleading, and latency is a performance measure, not a fairness-of-capture one."
 },
 {
  "d": 1,
  "q": "A team's model performs well in offline testing but its accuracy steadily degrades over months in production as customer behaviour shifts. What is this phenomenon, and what practice addresses it?",
  "o": [
   "Overfitting; the single fix is to reduce the number of input features the model was given",
   "Underfitting; the single fix is to train the same model for many more epochs up front",
   "Model drift; monitor performance on live data and retrain the model when accuracy declines",
   "Data leakage; the single fix is to remove the target column that leaked into the inputs"
  ],
  "a": 2,
  "e": "Accuracy decaying over time as real-world data shifts away from the training distribution is model (or data) drift; the practice is ongoing monitoring plus retraining. Overfitting, underfitting, and leakage are training-time conditions, not gradual post-deployment decay."
 },
 {
  "d": 1,
  "q": "A model scores 98% on the data it was trained on but only 71% on a held-out test set. What does this gap most directly indicate, and what is a reasonable response?",
  "o": [
   "Underfitting; the model is too simple, so the team should add more features or complexity",
   "Data leakage; the target variable is present in the input, so predictions are trivially correct",
   "Class imbalance; one class dominates, so accuracy alone overstates the model's real skill",
   "Overfitting; the model memorized training noise, so the team should simplify it or add data"
  ],
  "a": 3,
  "e": "High training accuracy with a large drop on unseen data is the classic signature of overfitting. Underfitting shows poor performance on both sets, leakage inflates both scores together, and imbalance is about class proportions — the train-vs-test gap points to overfitting."
 },
 {
  "d": 1,
  "q": "A hospital wants a model whose individual predictions a clinician can inspect and justify to a patient, and is willing to give up a small amount of accuracy to get it. Which consideration should drive the model choice?",
  "o": [
   "Favouring an interpretable model, since explainable predictions matter more than a marginal accuracy gain here",
   "Choosing the largest available model, since more parameters always improve how much a clinician can trust it",
   "Choosing whichever model has the lowest inference latency regardless of how it decides",
   "Choosing the model with the biggest training dataset, since more data guarantees fairness"
  ],
  "a": 0,
  "e": "In a high-stakes clinical setting where decisions must be justified, interpretability can outweigh a small accuracy gain — that trade-off should drive the choice. Model size, latency, and dataset size don't determine whether a prediction can be explained to a patient."
 },
 {
  "d": 2,
  "q": "A team notices that when they send a very long conversation history, the model starts ignoring instructions given near the beginning. Which limitation are they running into?",
  "o": [
   "The temperature setting, which is discarding the earliest instructions from the prompt",
   "The context window limit, beyond which earlier tokens are truncated or attended to weakly",
   "The embedding dimension, which caps how many distinct instructions a prompt may contain",
   "The guardrail policy, which is silently removing the opening instructions from each request"
  ],
  "a": 1,
  "e": "A model attending poorly to early content in a very long input reflects the finite context window — content beyond it is truncated or weakly attended. Temperature, embedding dimension, and guardrails don't cause early-instruction loss as input length grows."
 },
 {
  "d": 2,
  "q": "A summarization feature returns wildly different summaries each time it runs on the same input, and the team wants more consistent, repeatable output. Which inference setting change is most direct?",
  "o": [
   "Raise the temperature so the model samples from a wider range of possible next tokens",
   "Increase top-p so a larger pool of candidate tokens is considered at each step",
   "Lower the temperature so the model's sampling becomes more focused and deterministic",
   "Increase the maximum token limit so the model has room to produce fuller summaries"
  ],
  "a": 2,
  "e": "Lower temperature makes sampling more deterministic and repeatable. Raising temperature or top-p increases variability, and the token limit affects length, not consistency."
 },
 {
  "d": 2,
  "q": "A team wants to represent thousands of support articles so they can find the ones most semantically similar to a user's question. Which concept underpins this?",
  "o": [
   "Tokens, the sub-word units a model reads and generates when processing any given text",
   "Guardrails, configurable policies that filter harmful or disallowed prompts and responses",
   "Temperature, the setting that controls how random or focused generated output will be",
   "Embeddings, numeric vectors capturing semantic meaning so similarity can be measured"
  ],
  "a": 3,
  "e": "Embeddings map text to vectors whose distances reflect semantic similarity, enabling nearest-match search. Tokens are text units, guardrails enforce safety, and temperature controls randomness — none provide semantic similarity search."
 },
 {
  "d": 2,
  "q": "A team's application shows users a generated answer within a second by displaying tokens as they are produced, rather than waiting for the whole response. Which capability of the model API makes this possible?",
  "o": [
   "Response streaming, which returns tokens incrementally so output can be shown as it is generated",
   "A higher temperature, which speeds up how quickly the full response is returned to the user",
   "A larger context window, which lets the whole answer be delivered in one immediate block",
   "Prompt caching, which stores the finished answer so it appears instantly on the first request"
  ],
  "a": 0,
  "e": "Displaying output token-by-token as it's produced relies on response streaming, which returns partial output incrementally. Temperature and context window don't change delivery timing this way, and prompt caching reuses prefix computation, not first-response streaming."
 },
 {
  "d": 2,
  "q": "A model produces fluent text that confidently states facts which turn out to be false. What is this behaviour called, and what design choice most reduces it for factual answers?",
  "o": [
   "Tokenization; switching to a different sub-word vocabulary removes the fabricated statements",
   "Hallucination; grounding answers in retrieved source documents (RAG) reduces fabricated facts",
   "Overfitting; collecting a larger pre-training corpus eliminates all incorrect factual claims",
   "Latency; provisioning faster inference hardware prevents the model from inventing details"
  ],
  "a": 1,
  "e": "Confident but false output is hallucination; grounding responses in retrieved sources (RAG) is the standard mitigation for factual tasks. Tokenization, pre-training size, and hardware speed don't address factual grounding."
 },
 {
  "d": 2,
  "q": "A retrieval system returns passages that are keyword matches but often miss documents that mean the same thing in different words. Switching to which representation would most improve finding semantically related content?",
  "o": [
   "A higher temperature setting, so the retriever considers a wider spread of candidate documents",
   "A larger maximum token limit, so each retrieved document can be returned in fuller length",
   "Vector embeddings, so retrieval ranks documents by semantic similarity rather than exact keywords",
   "A different tokenizer vocabulary, so the same words are split into different sub-word units"
  ],
  "a": 2,
  "e": "Keyword search misses paraphrases; embedding-based (vector) retrieval ranks by semantic similarity, capturing same-meaning-different-words matches. Temperature and token limits don't change retrieval semantics, and swapping tokenizers doesn't add semantic matching."
 },
 {
  "d": 3,
  "q": "A RAG chatbot grounded in a fixed manual answers common questions well but confidently invents specifics when asked something the manual doesn't cover. Which change best reduces the harm from these gaps?",
  "o": [
   "Raise the temperature so the model produces more varied answers to the uncovered questions",
   "Remove the retrieval step so the model relies entirely on its broad pre-trained knowledge",
   "Increase the token limit so the model can generate longer answers for uncovered questions",
   "Instruct the model to answer only from the retrieved context and say when information is not found"
  ],
  "a": 3,
  "e": "Instructing the model to answer only from retrieved context and to explicitly say when something isn't found curbs fabrication on gaps. Higher temperature increases invention, removing retrieval removes grounding entirely, and a longer limit just yields longer fabrications."
 },
 {
  "d": 3,
  "q": "An agent that calls internal tools occasionally takes an unsafe or unintended action when a user request is ambiguous. Which control most directly reduces the risk of the agent acting wrongly on its own?",
  "o": [
   "Require human approval for high-impact actions and scope each tool to least-privilege access",
   "Give the agent broader tool permissions so it can always finish the task without being blocked",
   "Raise the model temperature so the agent explores more possible actions before choosing one",
   "Remove all logging so the agent's internal decisions are not exposed to reviewers afterwards"
  ],
  "a": 0,
  "e": "Human approval on high-impact actions plus least-privilege tool scoping limits what an agent can do wrong unsupervised. Broader permissions increase risk, higher temperature increases unpredictability, and removing logging destroys the oversight trail."
 },
 {
  "d": 3,
  "q": "A team gets good answers from a foundation model but needs it to consistently adopt a specific brand voice and terminology across every response, without supplying examples each time. Which approach fits best?",
  "o": [
   "Raising the temperature on each call so the responses sound more distinctive and on-brand",
   "Fine-tuning the model on brand-voice examples so the style is consistently applied by default",
   "Storing the finished responses in a knowledge base so future answers copy their exact wording",
   "Increasing the token limit so each response has room to express the full brand personality"
  ],
  "a": 1,
  "e": "Consistently baking in a style/voice without per-request examples is a fit for fine-tuning on brand-voice data. Temperature changes randomness not style, a knowledge base grounds facts not tone, and token limits govern length, not voice."
 },
 {
  "d": 3,
  "q": "A team runs the same foundation model for a real-time chat feature and for an overnight batch that summarizes millions of archived tickets, and wants to control cost for the non-urgent batch job. Which distinction should guide how they run each workload?",
  "o": [
   "Run both workloads with the maximum temperature so every response is generated as fast as possible",
   "Run both workloads through the same real-time endpoint, since batch processing is never cheaper",
   "Use latency-optimized real-time inference for chat, and cheaper batch inference for the overnight job",
   "Increase the token limit on the batch job so all tickets are summarized in one single request"
  ],
  "a": 2,
  "e": "Interactive chat needs real-time inference, while a non-urgent bulk job suits cheaper batch/asynchronous inference — matching the delivery mode to urgency controls cost. Temperature doesn't govern cost mode, real-time isn't the only option, and token limits don't merge millions of tickets into one call."
 },
 {
  "d": 3,
  "q": "A team compares two prompting strategies for a reasoning-heavy task and wants the model to show intermediate steps to improve answer quality. Which prompt technique are they applying?",
  "o": [
   "Zero-shot prompting, which gives only the task instruction with no reasoning steps requested",
   "Prompt caching, which reuses computation for a repeated prompt prefix across many requests",
   "Model distillation, which trains a smaller model to reproduce a larger model's outputs",
   "Chain-of-thought prompting, which asks the model to reason through steps before the final answer"
  ],
  "a": 3,
  "e": "Asking the model to work through intermediate steps before answering is chain-of-thought prompting, which often improves reasoning-heavy tasks. Zero-shot omits reasoning guidance, prompt caching is a cost/latency optimization, and distillation is a training technique."
 },
 {
  "d": 3,
  "q": "A production RAG system is accurate but too slow because it retrieves and re-ranks far more passages than needed on every query. Which adjustment most directly targets the latency without abandoning grounding?",
  "o": [
   "Retrieve fewer, higher-relevance passages (tune top-k and chunking) so less context is processed",
   "Remove retrieval entirely so the model answers from pre-trained knowledge with no lookup delay",
   "Raise the temperature so the model commits to an answer faster instead of weighing passages",
   "Increase the maximum token limit so longer contexts can be processed in a single pass"
  ],
  "a": 0,
  "e": "Retrieving fewer, more relevant passages (tuning top-k and chunking) cuts the context the model must process, reducing latency while keeping grounding. Removing retrieval drops grounding, temperature doesn't affect retrieval cost, and a larger limit adds work rather than removing it."
 },
 {
  "d": 3,
  "q": "A team wants to reuse a well-tested prompt across several applications and track changes to it over time as they refine the wording. Which Bedrock capability is purpose-built for this?",
  "o": [
   "Bedrock Knowledge Bases, which ingest and index documents so the model can answer from them",
   "Bedrock Prompt Management, which lets teams store, version, and reuse prompts as managed resources",
   "Bedrock Guardrails, which filter harmful content and restrict disallowed topics on both sides",
   "Bedrock Model Evaluation, which scores and compares foundation models on a provided dataset"
  ],
  "a": 1,
  "e": "Storing, versioning, and reusing prompts across teams and apps is exactly Bedrock Prompt Management. Knowledge Bases add retrieval, Guardrails enforce safety, and Model Evaluation compares models — none manage prompt versioning."
 },
 {
  "d": 3,
  "q": "A company wants a foundation model to answer questions using its own product manuals without retraining the model. Which managed Bedrock capability provides this?",
  "o": [
   "Amazon Polly, which converts written text into natural-sounding speech audio for playback",
   "Amazon Transcribe, which converts recorded or streaming speech audio into written text",
   "Bedrock Knowledge Bases, which provide managed retrieval so models answer from your documents",
   "AWS Glue, which extracts, transforms, and loads data between stores for analytics pipelines"
  ],
  "a": 2,
  "e": "Bedrock Knowledge Bases provide managed RAG so a model answers from your documents without retraining. Polly is text-to-speech, Transcribe is speech-to-text, and Glue is ETL — none provide document-grounded answering."
 },
 {
  "d": 4,
  "q": "Before releasing a hiring-screen model, a team wants evidence that it does not systematically disadvantage any protected group. Which activity most directly provides that evidence?",
  "o": [
   "Increasing the model's overall accuracy target until the aggregate score is as high as possible",
   "Lowering the inference latency so recruiters receive each candidate's score more quickly",
   "Expanding the model's context window so it can read longer candidate résumés in one pass",
   "Measuring the model's outcomes separately across groups and comparing fairness metrics between them"
  ],
  "a": 3,
  "e": "Disaggregating outcomes by group and comparing fairness metrics is how you evidence that a model doesn't systematically disadvantage a group. Aggregate accuracy can hide group disparities, and latency and context window are unrelated to fairness evidence."
 },
 {
  "d": 4,
  "q": "A company publishes a document describing a model's intended uses, known limitations, and performance across conditions so downstream teams use it appropriately. What is this artifact, and what responsible-AI goal does it serve?",
  "o": [
   "A model card; it promotes transparency so others understand where the model should and shouldn't be used",
   "A load-test report; it proves the model can serve peak request volume without failing",
   "A billing alarm; it warns teams when the model's inference spend crosses a set threshold",
   "A VPC endpoint policy; it defines which private networks are permitted to reach the model over AWS"
  ],
  "a": 0,
  "e": "Documenting intended use, limitations, and performance is a model card, serving transparency and appropriate use. A load-test report, billing alarm, and endpoint policy are operational or cost artifacts, not transparency documentation."
 },
 {
  "d": 4,
  "q": "A generative assistant will operate in a domain where a wrong answer could cause real harm. Beyond accuracy, which combination best reflects responsible operation once it is live?",
  "o": [
   "Turning off logging entirely so that no record of the assistant's mistakes is ever retained",
   "Continuous monitoring, a clear way for users to report problems, and human review of flagged cases",
   "Raising the temperature so the assistant's tone feels more confident and reassuring to users",
   "Removing usage limits so the assistant can respond to as many requests as possible per minute"
  ],
  "a": 1,
  "e": "Responsible live operation in a high-harm domain means ongoing monitoring, user feedback channels, and human review of flagged outputs. Disabling logging removes accountability, higher temperature adds risk, and lifting limits doesn't address harm."
 },
 {
  "d": 4,
  "q": "A team is concerned their training data may embed historical biases that the model will reproduce. Which step most directly addresses the source of that risk rather than its symptoms?",
  "o": [
   "Deploying the model across more Availability Zones so it stays available during retraining",
   "Raising the model's temperature so biased outputs are diluted by more random variation",
   "Examining and curating the training data for representativeness and known biased patterns",
   "Increasing the token limit so the model can add disclaimers to every response it generates"
  ],
  "a": 2,
  "e": "Because bias often originates in the data, examining and curating the training data for representativeness tackles the source. Multi-AZ deployment, temperature, and token limits address availability, randomness, and length — not the biased data itself."
 },
 {
  "d": 5,
  "q": "A team asks who is responsible for securing what when they use a managed AWS AI service: the underlying infrastructure versus their own data, access policies, and how they use the service. Which model describes this split?",
  "o": [
   "The context window model, where the provider and the customer alternate control of security on each request",
   "The tokenization model, where responsibility is divided according to how text is split into tokens",
   "The temperature model, where security duties shift depending on how deterministic outputs are",
   "The shared responsibility model, where AWS secures the cloud infrastructure and the customer secures their data and access"
  ],
  "a": 3,
  "e": "The division of security duties — AWS for the infrastructure, the customer for their data, IAM policies, and usage — is the shared responsibility model. The other options are invented; context window, tokenization, and temperature are not governance frameworks."
 },
 {
  "d": 5,
  "q": "A company operates under a regulation requiring that its customer data be processed and stored only within a specific country. Which AWS concept lets them satisfy this data-residency requirement when using AI services?",
  "o": [
   "Choosing an AWS Region located in the required country so data is processed and stored there",
   "Raising the model's temperature so responses are generated closer to the customer's location",
   "Increasing the token limit so more of the customer's data fits within one country's boundary",
   "Enabling response streaming so data crosses borders in smaller, less noticeable increments"
  ],
  "a": 0,
  "e": "Data residency is met by selecting an AWS Region in the required country, since Regions are geographically bounded. Temperature, token limits, and streaming have nothing to do with where data is physically processed or stored."
 },
 {
  "d": 5,
  "q": "A finance team is alarmed by an unexpectedly large bill from a generative AI feature and wants ongoing visibility into how much each workload is spending. Which AWS capability most directly gives them this?",
  "o": [
   "Raising the model's temperature so that each response consumes a more predictable amount of spend",
   "Cost monitoring and budget alerts that track AI service spend and warn when thresholds are crossed",
   "Increasing the token limit so that fewer requests are needed and the total bill automatically drops",
   "Enabling guardrails so that disallowed prompts are blocked before they can add to the invoice"
  ],
  "a": 1,
  "e": "Ongoing spend visibility and threshold warnings come from cost monitoring and budget alerts. Temperature doesn't govern cost, larger token limits tend to raise per-request cost, and guardrails address safety rather than billing visibility."
 }
];

</script>
<script>/* AIF-C01 Eval Engine — SAP-C02-style attempt model.
   - Three unique attempts of ATTEMPT_SIZE questions drawn from the bank without
     cross-attempt repeat (until the bank is exhausted).
   - Attempt 3+ leads with questions the learner previously answered wrong.
   - Per-question amber banner when a question was previously answered wrong.
   - Full explanation shown after each answer.
   Progress is kept in-memory + localStorage keyed by SET_KEY. No backend calls;
   swap persistState/loadState for Firestore to wire into the platform.
*/
(function () {
  const DOMAIN_NAMES = {
    1: "Fundamentals of AI & ML",
    2: "Fundamentals of Generative AI",
    3: "Applications of Foundation Models",
    4: "Guidelines for Responsible AI",
    5: "Security, Compliance & Governance"
  };
  const ATTEMPT_SIZE = 8;
  const MAX_ATTEMPTS = 3;

  function loadState(key) {
    try { return JSON.parse(localStorage.getItem(key)) || {}; }
    catch (e) { return {}; }
  }
  function persistState(key, s) {
    try { localStorage.setItem(key, JSON.stringify(s)); } catch (e) {}
  }

  // ── Firestore persistence (aifPrepResults collection) ──────────────────────
  // Results live at aifPrepResults/{setKey}, where setKey already embeds the
  // signed-in user's safe email (aif_set3_expert_v1__{safeEmail}). Firestore is
  // the source of truth so results follow the user across browsers/devices;
  // localStorage remains a fallback when Firestore is unavailable.
  let _fsMod = null, _fsDb = null;
  async function fsInit() {
    if (_fsDb) return _fsDb;
    try {
      const app = (window.SFAuth && window.SFAuth.getApp) ? window.SFAuth.getApp() : null;
      if (!app) return null;
      _fsMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      _fsDb = _fsMod.getFirestore(app);
      return _fsDb;
    } catch (e) { console.log("[aifPrepResults] Firestore init failed:", e && e.message); return null; }
  }
  async function fsLoad(setKey) {
    try {
      const db = await fsInit(); if (!db) return null;
      const snap = await _fsMod.getDoc(_fsMod.doc(db, "aifPrepResults", setKey));
      if (snap.exists()) { console.log("[aifPrepResults] loaded from Firestore:", setKey); return snap.data(); }
      return null;
    } catch (e) { console.log("[aifPrepResults] Firestore load failed:", e && e.message); return null; }
  }
  async function fsSave(setKey, state, email) {
    try {
      const db = await fsInit(); if (!db) return;
      await _fsMod.setDoc(_fsMod.doc(db, "aifPrepResults", setKey), Object.assign({}, state, {
        email: email || "", setKey: setKey, updatedAt: Date.now()
      }));
      console.log("[aifPrepResults] saved to Firestore:", setKey);
    } catch (e) { console.log("[aifPrepResults] Firestore save failed:", e && e.message); }
  }
  async function fsClear(setKey) {
    try {
      const db = await fsInit(); if (!db) return;
      await _fsMod.deleteDoc(_fsMod.doc(db, "aifPrepResults", setKey));
      console.log("[aifPrepResults] cleared Firestore doc:", setKey);
    } catch (e) { console.log("[aifPrepResults] Firestore clear failed:", e && e.message); }
  }

  // Deterministic shuffle so a given attempt is reproducible per seed.
  function seededShuffle(arr, seed) {
    const a = arr.slice(); let s = seed || 1;
    for (let i = a.length - 1; i > 0; i--) {
      s = (s * 9301 + 49297) % 233280;
      const j = Math.floor((s / 233280) * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Build the question list for a given attempt number (1-based).
  function buildAttempt(bank, state, attemptNo) {
    const used = new Set((state.usedIds || []));
    const wrong = new Set((state.wrongIds || []));
    const withIdx = bank.map((q, i) => Object.assign({ _id: i }, q));

    let pool = withIdx.filter(q => !used.has(q._id));
    // If the unused pool can't fill an attempt, allow reuse (bank exhausted).
    if (pool.length < ATTEMPT_SIZE) pool = withIdx.slice();

    let ordered = seededShuffle(pool, attemptNo * 17 + 3);

    // Attempt 3+ : lead with previously-wrong questions.
    if (attemptNo >= 3) {
      const lead = ordered.filter(q => wrong.has(q._id));
      const rest = ordered.filter(q => !wrong.has(q._id));
      ordered = lead.concat(rest);
    }

    // Try to spread domains across the selection.
    const picked = [], seenDomainCount = {};
    for (const q of ordered) {
      if (picked.length >= ATTEMPT_SIZE) break;
      const dc = seenDomainCount[q.d] || 0;
      if (dc < 2 || picked.length >= ATTEMPT_SIZE - 2) {
        picked.push(q); seenDomainCount[q.d] = dc + 1;
      }
    }
    let idx = 0;
    while (picked.length < ATTEMPT_SIZE && idx < ordered.length) {
      if (!picked.includes(ordered[idx])) picked.push(ordered[idx]);
      idx++;
    }
    return picked.slice(0, ATTEMPT_SIZE);
  }

  function AifEval(opts) {
    const bank = opts.bank;
    const SET_KEY = opts.setKey;
    const mount = opts.mount;
    const title = opts.title;
    const subtitle = opts.subtitle;
    const email = opts.email || "";

    let state = loadState(SET_KEY);
    state.usedIds = state.usedIds || [];
    state.wrongIds = state.wrongIds || [];
    state.attemptNo = state.attemptNo || 0;
    state.history = state.history || []; // [{attempt, score, total, ts}]

    let current = null; // {questions, answers[], pos}

    // Firestore is source of truth: if a doc exists, adopt it and refresh
    // localStorage from it; otherwise keep the localStorage state we loaded.
    (async () => {
      const remote = await fsLoad(SET_KEY);
      if (remote && Array.isArray(remote.history)) {
        state.usedIds = remote.usedIds || [];
        state.wrongIds = remote.wrongIds || [];
        state.attemptNo = remote.attemptNo || 0;
        state.history = remote.history || [];
        persistState(SET_KEY, state);
        if (!current) renderStart();
      }
    })();

    function startAttempt() {
      if (state.attemptNo >= MAX_ATTEMPTS) { renderExhausted(); return; }
      const attemptNo = state.attemptNo + 1;
      // One attempt walks ALL bank questions, grouped into domain sections in
      // ascending domain order. Option order is shuffled per question each
      // attempt so retakes don't preserve the A/B/C/D sequence; the correct
      // index is remapped so correctness is preserved. Domain/question order
      // stays fixed.
      const questions = bank
        .map((q, i) => Object.assign({ _id: i }, q))
        .sort((a, b) => (a.d - b.d) || (a._id - b._id))
        .map((q) => {
          const idx = q.o.map((_, i) => i);
          for (let k = idx.length - 1; k > 0; k--) {
            const j = Math.floor(Math.random() * (k + 1));
            [idx[k], idx[j]] = [idx[j], idx[k]];
          }
          const shuffledO = idx.map(i => q.o[i]);
          const newA = idx.indexOf(q.a);
          return Object.assign({}, q, { o: shuffledO, a: newA });
        });
      current = { attemptNo, questions, answers: new Array(questions.length).fill(null), pos: 0 };
      renderQuestion();
    }

    function renderQuestion() {
      const q = current.questions[current.pos];
      const wasWrong = state.wrongIds.includes(q._id);
      const answered = current.answers[current.pos];
      // Domain section context
      const domainQs = current.questions.filter(x => x.d === q.d);
      const posInDomain = domainQs.findIndex(x => x._id === q._id) + 1;
      const domainNo = Array.from(new Set(current.questions.map(x => x.d))).sort((a,b)=>a-b).indexOf(q.d) + 1;
      const totalDomains = new Set(current.questions.map(x => x.d)).size;
      let html = "";
      html += `<div class="aif-topbar"><span>Attempt ${current.attemptNo} of ${MAX_ATTEMPTS} · Domain ${domainNo} of ${totalDomains}</span>`;
      html += `<span>Question ${posInDomain} of ${domainQs.length}</span></div>`;
      html += `<div class="aif-progress"><div class="aif-progress-fill" style="width:${((current.pos) / current.questions.length) * 100}%"></div></div>`;
      html += `<div class="aif-domain">${DOMAIN_NAMES[q.d]}</div>`;
      if (wasWrong) {
        html += `<div class="aif-annot">⚠ You answered this incorrectly on a previous attempt — read carefully.</div>`;
      }
      html += `<div class="aif-q">${q.q}</div>`;
      html += `<div class="aif-opts">`;
      q.o.forEach((opt, i) => {
        let cls = "aif-opt";
        if (answered !== null) {
          if (i === q.a) cls += " correct";
          else if (i === answered) cls += " wrong";
          cls += " locked";
        }
        html += `<button class="${cls}" data-i="${i}" ${answered !== null ? "disabled" : ""}>`;
        html += `<span class="aif-letter">${String.fromCharCode(65 + i)}</span>${opt}</button>`;
      });
      html += `</div>`;
      if (answered !== null) {
        const right = answered === q.a;
        html += `<div class="aif-expl ${right ? "ok" : "no"}">`;
        html += `<strong>${right ? "Correct." : "Not quite."}</strong> ${q.e}</div>`;
        const isLast = current.pos === current.questions.length - 1;
        const nextDifferentDomain = !isLast && current.questions[current.pos + 1].d !== q.d;
        let label = "Next question";
        if (isLast) label = "See results";
        else if (nextDifferentDomain) label = "Move to next domain";
        html += `<div class="aif-nav"><button class="aif-next" id="aif-next">${label}</button></div>`;
      }
      mount.innerHTML = html;

      mount.querySelectorAll(".aif-opt").forEach(btn => {
        btn.addEventListener("click", () => {
          if (current.answers[current.pos] !== null) return;
          const i = parseInt(btn.getAttribute("data-i"), 10);
          current.answers[current.pos] = i;
          if (i !== q.a && !state.wrongIds.includes(q._id)) state.wrongIds.push(q._id);
          if (i === q.a) state.wrongIds = state.wrongIds.filter(id => id !== q._id);
          renderQuestion();
        });
      });
      const next = mount.querySelector("#aif-next");
      if (next) next.addEventListener("click", () => {
        if (current.pos < current.questions.length - 1) { current.pos++; renderQuestion(); }
        else finishAttempt();
      });
    }

    function finishAttempt() {
      let score = 0;
      current.questions.forEach((q, i) => { if (current.answers[i] === q.a) score++; });
      current.questions.forEach(q => { if (!state.usedIds.includes(q._id)) state.usedIds.push(q._id); });
      state.attemptNo = current.attemptNo;
      state.history.push({ attempt: current.attemptNo, score, total: current.questions.length, ts: Date.now() });
      persistState(SET_KEY, state);
      fsSave(SET_KEY, state, email);
      renderResults(score, current.questions.length);
    }

    function renderResults(score, total) {
      const pct = Math.round((score / total) * 100);
      // Domain breakdown for this attempt
      const dTotals = {}, dRight = {};
      current.questions.forEach((q, i) => {
        dTotals[q.d] = (dTotals[q.d] || 0) + 1;
        if (current.answers[i] === q.a) dRight[q.d] = (dRight[q.d] || 0) + 1;
      });
      let html = `<div class="aif-result"><div class="aif-score">${score}/${total}</div>`;
      html += `<div class="aif-pct">${pct}%</div>`;
      html += `<div class="aif-verdict">${pct >= 70 ? "On track — 70%+ suggests readiness on this set." : "Keep practicing — aim for 70%+ before exam day."}</div>`;
      html += `<div class="aif-break"><div class="aif-break-title">By domain (this attempt)</div>`;
      Object.keys(dTotals).sort().forEach(d => {
        const r = dRight[d] || 0, t = dTotals[d];
        html += `<div class="aif-break-row"><span>${DOMAIN_NAMES[d]}</span><span>${r}/${t}</span></div>`;
      });
      html += `</div>`;
      if (state.attemptNo < MAX_ATTEMPTS) {
        html += `<button class="aif-next" id="aif-again">Start attempt ${state.attemptNo + 1}</button>`;
      } else {
        html += `<div class="aif-verdict">All ${MAX_ATTEMPTS} attempts complete.</div>`;
      }
      html += `<button class="aif-reset" id="aif-reset">Reset all progress</button></div>`;
      mount.innerHTML = html;
      const again = mount.querySelector("#aif-again");
      if (again) again.addEventListener("click", startAttempt);
      mount.querySelector("#aif-reset").addEventListener("click", () => {
        localStorage.removeItem(SET_KEY);
        fsClear(SET_KEY);
        state = { usedIds: [], wrongIds: [], attemptNo: 0, history: [] };
        renderStart();
      });
    }

    function renderExhausted() { renderResults(0, ATTEMPT_SIZE); }

    function renderStart() {
      let html = `<div class="aif-start"><h1>${title}</h1><p class="aif-sub">${subtitle}</p>`;
      html += `<ul class="aif-meta"><li>${MAX_ATTEMPTS} attempts · all questions across five domain sections</li>`;
      html += `<li>One section per AIF-C01 domain, in order</li>`;
      html += `<li>Full explanation after every question</li></ul>`;
      if (state.history.length) {
        html += `<div class="aif-break"><div class="aif-break-title">Your attempts so far</div>`;
        state.history.forEach(h => {
          html += `<div class="aif-break-row"><span>Attempt ${h.attempt}</span><span>${h.score}/${h.total}</span></div>`;
        });
        html += `</div>`;
      }
      const label = state.attemptNo >= MAX_ATTEMPTS ? "All attempts used"
        : state.attemptNo > 0 ? `Start attempt ${state.attemptNo + 1}` : "Start attempt 1";
      html += `<button class="aif-next" id="aif-begin" ${state.attemptNo >= MAX_ATTEMPTS ? "disabled" : ""}>${label}</button>`;
      if (state.attemptNo > 0) html += `<button class="aif-reset" id="aif-reset2">Reset all progress</button>`;
      html += `</div>`;
      mount.innerHTML = html;
      const begin = mount.querySelector("#aif-begin");
      if (begin) begin.addEventListener("click", startAttempt);
      const r2 = mount.querySelector("#aif-reset2");
      if (r2) r2.addEventListener("click", () => {
        localStorage.removeItem(SET_KEY);
        fsClear(SET_KEY);
        state = { usedIds: [], wrongIds: [], attemptNo: 0, history: [] };
        renderStart();
      });
    }

    renderStart();
  }

  window.AifEval = AifEval;
})();
</script>
<script>/* SF auth gate — Google SSO (hd: sourcefuse.com) + email/password fallback.
   Reuses the sfcertification-grafana Firebase project. Firebase v10 modular SDK
   loaded via CDN in the page. Exposes window.SFAuth.mount(onReady) which shows
   the overlay and calls onReady(email) once a valid @sourcefuse.com user is in.
   NOTE: paste the real sfcertification-grafana firebaseConfig values below —
   left as clearly-marked placeholders per the golden rule (never invent config). */
(function () {
  const firebaseConfig = {
    apiKey: "AIzaSyC-I-IOCq2fCwa471fsD5xOn6SYQSBDp7Q",
    authDomain: "sfcertification-grafana.firebaseapp.com",
    projectId: "sfcertification-grafana",
    storageBucket: "sfcertification-grafana.firebasestorage.app",
    messagingSenderId: "227322696511",
    appId: "1:227322696511:web:12e7ced7dd3d45fa06798a"
  };
  const ALLOWED_DOMAIN = "sourcefuse.com";
  const ALLOWED_EXTRA = ["ravjv2013@gmail.com"];  // TEST ONLY — remove after testing

  let app, auth, GoogleProvider, signInRedirect, getRedirect, signInEmail, onAuth, signOutFn;
  let readyCb = null;

  async function initFirebase() {
    const appMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const authMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
    // Reuse default app if the host page already initialized it.
    app = appMod.getApps().length ? appMod.getApp() : appMod.initializeApp(firebaseConfig);
    auth = authMod.getAuth(app);
    GoogleProvider = authMod.GoogleAuthProvider;
    signInRedirect = (p) => authMod.signInWithRedirect(auth, p);
    getRedirect = () => authMod.getRedirectResult(auth);
    signInEmail = (e, pw) => authMod.signInWithEmailAndPassword(auth, e, pw);
    onAuth = (cb) => authMod.onAuthStateChanged(auth, cb);
    signOutFn = () => authMod.signOut(auth);
  }

  function overlayHTML() {
    return `
    <div class="sf-auth-backdrop" id="sf-auth">
      <div class="sf-auth-card">
        <div class="sf-auth-badge">SF Knowledge Hub</div>
        <h2>Sign in to start</h2>
        <p class="sf-auth-sub">Use your SourceFuse account to save your attempts.</p>
        <button class="sf-google" id="sf-google">
          <span class="sf-g">G</span> Sign in with Google
        </button>
        <div class="sf-or"><span>or</span></div>
        <label class="sf-lbl">Email</label>
        <input class="sf-inp" id="sf-email" type="email" placeholder="you@sourcefuse.com" autocomplete="username">
        <label class="sf-lbl">Password</label>
        <input class="sf-inp" id="sf-pass" type="password" placeholder="••••••••" autocomplete="current-password">
        <button class="sf-signin" id="sf-signin">Sign in</button>
        <div class="sf-err" id="sf-err"></div>
      </div>
    </div>`;
  }

  function styleTag() {
    return `<style>
    .sf-auth-backdrop{position:fixed;inset:0;background:rgba(16,38,60,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
    .sf-auth-card{background:#fff;border-radius:16px;padding:30px 28px;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(10,30,55,.25);font-family:inherit}
    .sf-auth-badge{display:inline-block;background:var(--blue,#1a6eb5);color:#fff;font-weight:700;font-size:12px;padding:4px 11px;border-radius:14px;margin-bottom:14px}
    .sf-auth-card h2{margin:0 0 4px;font-size:20px;color:#1a2733}
    .sf-auth-sub{margin:0 0 20px;color:#5a6b7a;font-size:14px}
    .sf-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:1.5px solid #dbe3ec;border-radius:10px;padding:12px;font-size:15px;font-weight:600;color:#1a2733;cursor:pointer;font-family:inherit}
    .sf-google:hover{background:#f7fbff;border-color:var(--blue,#1a6eb5)}
    .sf-g{background:conic-gradient(from -45deg,#ea4335 0 25%,#fbbc05 0 50%,#34a853 0 75%,#4285f4 0);color:#fff;font-weight:800;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
    .sf-or{display:flex;align-items:center;text-align:center;color:#93a1af;font-size:12px;margin:18px 0}
    .sf-or::before,.sf-or::after{content:"";flex:1;height:1px;background:#e2e8ef}
    .sf-or span{padding:0 12px}
    .sf-lbl{display:block;font-size:12.5px;font-weight:600;color:#5a6b7a;margin-bottom:5px}
    .sf-inp{width:100%;border:1.5px solid #dbe3ec;border-radius:9px;padding:11px 12px;font-size:14.5px;margin-bottom:14px;font-family:inherit}
    .sf-inp:focus{outline:none;border-color:var(--blue,#1a6eb5)}
    .sf-signin{width:100%;background:var(--blue,#1a6eb5);color:#fff;border:0;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .sf-signin:hover{background:var(--blue-d,#12507f)}
    .sf-err{color:#b5341a;font-size:13px;margin-top:12px;min-height:16px}
    </style>`;
  }

  function fail(msg) { const e = document.getElementById("sf-err"); if (e) e.textContent = msg; }

  function validDomain(email) {
    if (typeof email !== "string") return false;
    const e = email.toLowerCase();
    return e.endsWith("@" + ALLOWED_DOMAIN) || ALLOWED_EXTRA.includes(e);
  }

  function proceed(email) {
    const el = document.getElementById("sf-auth");
    if (el) el.remove();
    if (readyCb) readyCb(email);
  }

  async function wireOverlay() {
    document.getElementById("sf-google").addEventListener("click", async () => {
      fail("");
      if (!signInRedirect) return fail("Auth service not ready — Google SSO needs the deployed https host. Use email/password below.");
      try {
        const provider = new GoogleProvider();
        provider.setCustomParameters({ hd: ALLOWED_DOMAIN, prompt: "select_account" });
        // Redirect leaves the page and returns to it; result is picked up on load
        // by handleRedirectResult(). This works inside the LMS iframe, unlike popup.
        await signInRedirect(provider);
      } catch (err) {
        fail("Google sign-in couldn't start. Use email/password below.");
      }
    });
    document.getElementById("sf-signin").addEventListener("click", async () => {
      fail("");
      const email = (document.getElementById("sf-email").value || "").trim();
      const pass = document.getElementById("sf-pass").value || "";
      if (!validDomain(email)) return fail("Email must be an @sourcefuse.com address.");
      if (!pass) return fail("Enter your password.");
      try {
        const res = await signInEmail(email, pass);
        const e = (res.user && res.user.email) || email;
        proceed(e);
      } catch (err) { fail("Incorrect email or password."); }
    });
  }

  async function mount(onReady) {
    readyCb = onReady;
    document.head.insertAdjacentHTML("beforeend", styleTag());
    document.body.insertAdjacentHTML("beforeend", overlayHTML());
    try {
      await initFirebase();
    } catch (e) {
      // If Firebase can't load (e.g. local file://), keep overlay but let email/password
      // at least validate domain so the page is testable; real auth needs https host.
      fail("Auth service loading… (Google SSO needs the deployed https host).");
    }
    // Handle the return leg of signInWithRedirect: when the user comes back from
    // Google, getRedirectResult() resolves with their credential.
    if (getRedirect) {
      try {
        const res = await getRedirect();
        if (res && res.user) {
          const email = res.user.email;
          if (!validDomain(email)) { await signOutFn(); fail("Please use your @sourcefuse.com account."); }
          else { proceed(email); return; }
        }
      } catch (err) {
        fail("Google sign-in didn't complete. Try again or use email/password.");
      }
    }
    // If a session already exists (redirect just completed, or prior session), skip the overlay.
    if (onAuth) {
      onAuth((user) => {
        if (user && validDomain(user.email)) proceed(user.email);
      });
    }
    wireOverlay();
  }

  window.SFAuth = { mount, getApp: () => app };
})();
</script>
