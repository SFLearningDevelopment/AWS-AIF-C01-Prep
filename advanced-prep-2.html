<script>
// AIF-C01 Prep — Set 2 (Intermediate to Advanced)
// Original scenario-based MCQs. Domain distribution mirrors AIF-C01 weightings.
// Answer positions balanced across A-D to avoid position bias.
window.AIF_BANK_SET2 = [
 {
  "d": 1,
  "q": "A fraud team has millions of transactions but only ~0.3% are labeled fraudulent. A model trained on this data reports 99.7% accuracy yet misses almost all fraud. What is the core problem and a sound fix?",
  "o": [
   "Severe class imbalance is inflating accuracy; use metrics like recall/precision and rebalancing or class weighting",
   "The model is underfitting; raising model complexity and training longer will fix the missed-fraud problem",
   "The sampling temperature is set too low; increasing it will surface the fraudulent transactions being missed",
   "The dataset is simply too small, and the only viable fix is spending years collecting more labeled fraud examples"
  ],
  "a": 0,
  "e": "With 0.3% positives, a model can hit 99.7% accuracy by predicting 'not fraud' every time — accuracy is misleading under class imbalance. The right response is to evaluate with recall/precision/F1 and address imbalance (resampling, class weights, thresholds). Temperature applies to generative sampling, not this classifier, and complexity alone won't fix a metric/imbalance problem."
 },
 {
  "d": 1,
  "q": "A team must choose between a simple, highly interpretable model and a complex model with slightly higher accuracy for a regulated credit decision. Which trade-off is most relevant to weigh?",
  "o": [
   "Token cost vs. context window",
   "Interpretability/explainability vs. marginal accuracy gain",
   "Batch vs. real-time inference latency only",
   "Supervised vs. unsupervised labeling cost only"
  ],
  "a": 1,
  "e": "In regulated decisions affecting people, the interpretability-versus-accuracy trade-off is central: a small accuracy gain may not justify losing the ability to explain and justify decisions. The other trade-offs exist but are not the governing concern for a regulated credit decision."
 },
 {
  "d": 1,
  "q": "During evaluation, a classifier shows high precision but low recall on the positive class. What does this indicate?",
  "o": [
   "It is labelling almost everything as positive, which is why the reported scores look the way they do",
   "It is perfectly calibrated, so its predicted probabilities can be trusted directly without adjustment",
   "When it predicts positive it is usually right, but it misses many true positives",
   "Its overall accuracy on the dataset must therefore also be correspondingly high across both classes"
  ],
  "a": 2,
  "e": "High precision means positive predictions are usually correct; low recall means many actual positives are missed. Labeling everything positive would lower precision. Calibration and overall accuracy are separate properties."
 },
 {
  "d": 1,
  "q": "A company wants a managed way to label a large image dataset using human annotators plus automation. Which SageMaker capability fits?",
  "o": [
   "SageMaker Model Monitor",
   "SageMaker Neo",
   "SageMaker Feature Store",
   "SageMaker Ground Truth"
  ],
  "a": 3,
  "e": "SageMaker Ground Truth manages data labeling workflows combining human labelers with automation. Model Monitor watches deployed models for drift, Neo compiles models for edge devices, and Feature Store manages features — none handle labeling."
 },
 {
  "d": 2,
  "q": "An application must return answers strictly grounded in a fixed policy document and must minimize hallucination, but the policy changes weekly. Which design is most appropriate?",
  "o": [
   "Use RAG so the latest policy is retrieved at query time as grounding context",
   "Fine-tune the model on the policy document every week so the newest version is baked into its weights",
   "Increase the sampling temperature to encourage more creative answers grounded in the current policy",
   "Cache a single canonical answer and reuse it for all policy questions to guarantee consistency"
  ],
  "a": 0,
  "e": "RAG retrieves the current policy at query time, so weekly changes are reflected without retraining and answers stay grounded — reducing hallucination. Weekly fine-tuning is slow and costly for frequently changing text, higher temperature increases variability, and caching a single answer ignores question variety."
 },
 {
  "d": 2,
  "q": "A team compares two foundation models for a summarization feature and needs a repeatable, managed way to score quality on their own dataset. Which Bedrock capability is designed for this?",
  "o": [
   "Amazon Bedrock Guardrails",
   "Amazon Bedrock Model Evaluation",
   "Amazon Bedrock Playgrounds only",
   "Amazon CloudWatch Logs"
  ],
  "a": 1,
  "e": "Bedrock Model Evaluation provides managed, repeatable evaluation (automatic and human-based) to compare models on your data. Guardrails enforce safety policies, Playgrounds are for ad-hoc manual trials, and CloudWatch Logs record events rather than scoring model quality."
 },
 {
  "d": 2,
  "q": "Two teams debate embeddings. Which statement is correct?",
  "o": [
   "Embeddings are encrypted copies of the prompt, used to secure the text before it is sent to the model",
   "Embeddings are a mechanism that disables a model's built-in safety filters for a given request",
   "Embeddings are numeric vector representations that capture semantic meaning, enabling similarity search",
   "Embeddings are the billing tokens the model uses to meter and charge for each request that is processed"
  ],
  "a": 2,
  "e": "Embeddings map text (or other data) into numeric vectors whose distances reflect semantic similarity, powering search and retrieval. They are not encrypted prompts, safety controls, or billing units."
 },
 {
  "d": 2,
  "q": "A startup wants lower latency and cost for a high-volume chat feature and is willing to accept a smaller model if quality stays acceptable. Which selection factor set is most relevant?",
  "o": [
   "Only the model's release date, since newer models are always the better choice for any workload",
   "The console theme colour and interface layout the team prefers when working with the model",
   "The total number of AWS Regions in the world, since broader coverage makes the model a better fit",
   "Model size/capability, latency, and cost trade-offs for the use case"
  ],
  "a": 3,
  "e": "Choosing a model means balancing capability against latency and cost for the specific workload — a smaller, cheaper, faster model can be the right pick if quality suffices. Release date alone, UI theme, and Region count are not selection criteria."
 },
 {
  "d": 2,
  "q": "An organization wants to centrally store, version, and reuse tested prompts across teams in Bedrock. Which capability supports this?",
  "o": [
   "Bedrock Prompt Management",
   "Amazon S3 Glacier",
   "AWS Trusted Advisor",
   "Amazon EventBridge"
  ],
  "a": 0,
  "e": "Bedrock Prompt Management lets teams create, version, and reuse prompts as managed resources. Glacier is archival storage, Trusted Advisor gives best-practice checks, and EventBridge routes events."
 },
 {
  "d": 2,
  "q": "A team wants to process mixed documents (PDFs, images, audio) into structured outputs to feed a generative workflow with minimal custom code. Which newer Bedrock capability targets this?",
  "o": [
   "Amazon Bedrock Guardrails",
   "Amazon Bedrock Data Automation",
   "Amazon Bedrock Playgrounds",
   "Amazon SNS"
  ],
  "a": 1,
  "e": "Bedrock Data Automation extracts and structures content from unstructured multimodal inputs (documents, images, audio, video) to feed downstream GenAI workflows. Guardrails enforce safety, Playgrounds are manual testing, and SNS is messaging."
 },
 {
  "d": 3,
  "q": "A RAG chatbot returns fluent answers that are often unrelated to the retrieved passages. Which is the MOST likely cause to investigate first?",
  "o": [
   "The IAM policy attached to the application is too permissive, which is corrupting the generated answers",
   "The source S3 bucket holding the documents is deployed in the wrong Region, causing off-topic responses",
   "Poor retrieval relevance/chunking so the model isn't grounded in the right context",
   "The model's sampling temperature is set to 0, which is why the answers drift away from the retrieved passages"
  ],
  "a": 2,
  "e": "When answers ignore the source, the retrieval stage is the prime suspect — poor chunking, embeddings, or relevance means the right context never reaches the model. IAM and bucket Region wouldn't cause off-topic-but-fluent answers, and temperature 0 makes output more deterministic, not less grounded."
 },
 {
  "d": 3,
  "q": "An enterprise needs an agent that plans multi-step tasks, calls internal APIs, retains session context, and must scale securely in production. Which approach best fits current AWS tooling?",
  "o": [
   "A single static prompt with no tool access, relying on the base model alone to complete every step",
   "A CloudWatch dashboard configured to monitor the metrics emitted during the multi-step task execution",
   "An S3 lifecycle policy that transitions the task's intermediate data between storage classes over time",
   "Bedrock Agents (with AgentCore capabilities) to orchestrate tool calls, memory, and secure execution"
  ],
  "a": 3,
  "e": "Building production agents that plan, call tools/APIs, and manage memory/identity securely is what Bedrock Agents and AgentCore capabilities are for. A static prompt can't call tools or manage steps; CloudWatch and S3 lifecycle policies are monitoring and storage features."
 },
 {
  "d": 3,
  "q": "A team must decide between fine-tuning and RAG for a bot that needs up-to-date factual answers from frequently updated internal wikis. Which choice and reason is soundest?",
  "o": [
   "RAG, because it grounds answers in current retrieved documents without retraining on every update",
   "Fine-tuning, because it injects the latest wiki facts into the model live at query time on every request",
   "Fine-tuning, because it is always cheaper than retrieval and avoids the cost of maintaining a search index",
   "RAG, because it continuously updates the model's internal weights to reflect each change made to the wikis"
  ],
  "a": 0,
  "e": "RAG suits frequently changing factual knowledge — it retrieves current documents at query time without retraining. Fine-tuning bakes knowledge into weights (not live facts) and is costly to repeat on every wiki edit. RAG does not alter model weights."
 },
 {
  "d": 3,
  "q": "A prompt keeps producing inconsistent JSON that breaks a downstream parser. Which prompt-engineering adjustment most directly improves structural reliability?",
  "o": [
   "Increase the sampling temperature and top-p so the model has more freedom to format the JSON response",
   "Specify an explicit output schema/format with an example and constrain the response",
   "Instruct the model to be more creative and expressive when composing the structured JSON it returns",
   "Remove all formatting instructions to keep the prompt as short as possible and let the model decide the shape"
  ],
  "a": 1,
  "e": "Giving an explicit format/schema plus an example (and lowering randomness) makes structured output far more reliable. Raising temperature/top-p or asking for creativity increases variability, and stripping instructions removes the guidance the parser depends on."
 },
 {
  "d": 3,
  "q": "A company wants to reduce repeated cost and latency when the same large context prefix is sent on many Bedrock requests. Which capability helps most?",
  "o": [
   "Guardrails",
   "Model distillation at inference",
   "Prompt caching",
   "Cross-Region replication"
  ],
  "a": 2,
  "e": "Prompt caching reuses computation for a repeated context prefix, cutting latency and cost on subsequent calls. Guardrails enforce safety, distillation is a training-time technique, and cross-Region replication copies data, not prompt compute."
 },
 {
  "d": 3,
  "q": "An agent occasionally emits disallowed content and also leaks a customer's PII from context. Which layered controls address BOTH issues?",
  "o": [
   "Only raise the maximum token limit so the model has room to complete its responses without truncation",
   "Only lower the sampling temperature so the model produces more deterministic and predictable output",
   "Only enable CloudTrail so that every request and response is recorded for later review by the security team",
   "Apply Bedrock Guardrails for content/topic and sensitive-information (PII) filtering across prompts and responses",
   "Switch the workload to a different AWS Region where the disallowed content and PII leakage will not occur"
  ],
  "a": 3,
  "e": "Guardrails can filter harmful/disallowed content AND detect/redact sensitive information such as PII on both input and output — covering both problems. Token limits and temperature don't enforce policy, and CloudTrail only audits API calls after the fact."
 },
 {
  "d": 3,
  "q": "A team fine-tunes a model on 40 examples and it now parrots those examples but fails on anything slightly different. What happened and what's a reasonable fix?",
  "o": [
   "Overfitting to a tiny dataset; add more diverse examples or prefer RAG/prompting for this need",
   "Underfitting on the task; the fix is to reduce the training data further so the model generalizes better",
   "A tokenization error introduced during training; the fix is to move the workload to a different Region",
   "A guardrail misconfiguration is causing the behaviour; the fix is to disable guardrails on the model"
  ],
  "a": 0,
  "e": "A model that memorizes a tiny tuning set and fails to generalize is overfitting; expanding and diversifying data — or using RAG/prompting instead of tuning — is the sensible path. Reducing data worsens it, and the issue is unrelated to Regions or guardrails."
 },
 {
  "d": 4,
  "q": "A generative feature must be launched responsibly. Which combination best reflects responsible-AI practice before and after launch?",
  "o": [
   "Ship the feature quickly and add oversight or review only later, if and when users actually complain",
   "Assess bias/fairness, document limitations, add guardrails and human review for high-risk paths, and monitor after release",
   "Disable all logging to protect user privacy and skip pre-launch evaluation to accelerate the release",
   "Maximize the sampling temperature so the generated output feels more human and natural to end users"
  ],
  "a": 1,
  "e": "Responsible deployment means evaluating fairness, documenting limits, adding guardrails and human-in-the-loop for risky decisions, and monitoring in production. Shipping without oversight, disabling logging (which harms accountability), or tuning for 'human-ness' are not responsible-AI controls."
 },
 {
  "d": 4,
  "q": "An image model produces lower-quality results for certain skin tones, traced to unrepresentative training data. Which term and remedy pair is correct?",
  "o": [
   "Overfitting to the training set; the remedy is to raise the sampling temperature during generation",
   "A latency problem in the pipeline; the remedy is to add caching so results are returned more quickly",
   "Data/representation bias; improve dataset diversity and evaluate fairness across groups",
   "A prompt-injection security issue; the remedy is to rotate the API keys used to call the image model"
  ],
  "a": 2,
  "e": "Unequal performance stemming from unrepresentative data is representation bias; the remedy is more diverse data plus fairness evaluation across groups. It is not overfitting, latency, or a prompt-injection security issue."
 },
 {
  "d": 4,
  "q": "For an AI system that denies or approves benefits, which capability most improves accountability to affected individuals?",
  "o": [
   "Storing every prompt and response in Amazon S3 Glacier so a long-term archived record is retained",
   "Configuring higher top-p sampling so the system's decisions are expressed more clearly to reviewers",
   "Deploying across more Availability Zones so the decision service is more resilient and highly available",
   "Explainability of decisions plus documented model cards and human review"
  ],
  "a": 3,
  "e": "Accountability comes from being able to explain decisions, document intended use/limitations (model cards), and provide human review. Archival storage, sampling parameters, and infrastructure redundancy don't make individual decisions explainable."
 },
 {
  "d": 4,
  "q": "A team wants to reduce toxic or biased generations at inference without retraining. Which is the most direct, responsible control on AWS?",
  "o": [
   "Amazon Bedrock Guardrails content filters and denied topics",
   "Amazon EBS snapshots taken on a schedule to capture the model's state and reduce toxic output",
   "AWS Cost Explorer analysis to identify and reduce the spend associated with biased generations",
   "Amazon Route 53 routing rules that direct requests away from prompts likely to produce toxic output"
  ],
  "a": 0,
  "e": "Bedrock Guardrails apply content filters and topic denials at inference to curb toxic/biased output without retraining. Snapshots, cost analysis, and DNS routing are unrelated to output safety."
 },
 {
  "d": 5,
  "q": "An enterprise requires that data sent to Bedrock never traverse the public internet. Which approach meets this?",
  "o": [
   "Use the public Bedrock endpoint but protect it with a strong password so traffic stays private in transit",
   "Access Bedrock over a VPC interface endpoint (AWS PrivateLink) to keep traffic on the AWS network",
   "Raise the model's sampling temperature so that requests are handled without leaving the AWS network",
   "Store all prompts and responses in a public S3 bucket so the data path never touches the public internet"
  ],
  "a": 1,
  "e": "A VPC interface endpoint (PrivateLink) lets traffic to Bedrock stay on the AWS private network rather than the public internet. Passwords on public endpoints, temperature, and public buckets do not satisfy the private-networking requirement."
 },
 {
  "d": 5,
  "q": "To follow least-privilege for a team that should only invoke one specific Bedrock model, what is the best practice?",
  "o": [
   "Grant the team full administrator access for convenience so they are never blocked while invoking the model",
   "Share a single root account across the whole team so everyone invokes the model with the same credentials",
   "Write a scoped IAM policy allowing only the required Bedrock invoke action on that model resource",
   "Disable IAM entirely for the workload so that access to the specific model is never unintentionally blocked"
  ],
  "a": 2,
  "e": "Least privilege means granting only the specific action on the specific resource via a scoped IAM policy. Admin access, shared root accounts, and disabling IAM all violate security best practice."
 },
 {
  "d": 5,
  "q": "A regulated firm must prove which users invoked which models and when, for an audit. Which combination provides this governance evidence?",
  "o": [
   "CloudTrail for API activity plus IAM identities, with logs retained per policy",
   "Increasing the maximum token limit so that every request and its full response are captured for audit",
   "Provisioning a larger EC2 instance so the platform can retain a complete record of who invoked what",
   "Relying only on the Bedrock Playground history to show which users invoked which models and when"
  ],
  "a": 0,
  "e": "CloudTrail records API calls tied to IAM identities, and retaining those logs provides the audit trail regulators expect. Playground history, token limits, and instance sizing don't constitute governance evidence."
 },
 {
  "d": 5,
  "q": "A company wants to encrypt data at rest for their AI datasets and manage the keys with rotation and access control. Which service fits?",
  "o": [
   "AWS KMS",
   "Amazon Lex",
   "Amazon Polly",
   "AWS Ground Station"
  ],
  "a": 0,
  "e": "AWS KMS manages encryption keys — including rotation and access policies — for encrypting data at rest across AWS services. Lex, Polly, and Ground Station are unrelated to key management."
 },
 {
  "d": 5,
  "q": "During a security review, a team finds prompts may contain customer PII that shouldn't reach the model. Which layered response is soundest?",
  "o": [
   "Ignore the finding, since foundation models do not store the data sent to them and the PII poses no risk",
   "Redact/filter PII (e.g., Guardrails sensitive-info filters) AND restrict access via IAM AND audit with CloudTrail",
   "Only rename the S3 bucket holding the prompts so the sensitive customer PII is harder for others to locate",
   "Only increase the request token limit so that longer prompts containing the customer PII are not truncated"
  ],
  "a": 1,
  "e": "A layered response — filtering/redacting PII, restricting access with IAM, and auditing with CloudTrail — addresses the risk in depth. Assuming no storage is unsafe, and bucket renaming or token limits don't protect sensitive data."
 }

<script>/* AIF-C01 Eval Engine — SAP-C02-style attempt model.
   - Three unique attempts of ATTEMPT_SIZE questions drawn from the bank without
     cross-attempt repeat (until the bank is exhausted).
   - Attempt 3+ leads with questions the learner previously answered wrong.
   - Per-question amber banner when a question was previously answered wrong.
   - Full explanation shown after each answer.
   Progress is kept in-memory + localStorage keyed by SET_KEY. No backend calls;
   swap persistState/loadState for Firestore to wire into the platform.
*/
(function () {
  const DOMAIN_NAMES = {
    1: "Fundamentals of AI & ML",
    2: "Fundamentals of Generative AI",
    3: "Applications of Foundation Models",
    4: "Guidelines for Responsible AI",
    5: "Security, Compliance & Governance"
  };
  const ATTEMPT_SIZE = 8;
  const MAX_ATTEMPTS = 3;

  function loadState(key) {
    try { return JSON.parse(localStorage.getItem(key)) || {}; }
    catch (e) { return {}; }
  }
  function persistState(key, s) {
    try { localStorage.setItem(key, JSON.stringify(s)); } catch (e) {}
  }

  // ── Firestore persistence (aifPrepResults collection) ──────────────────────
  // Results live at aifPrepResults/{setKey}, where setKey already embeds the
  // signed-in user's safe email (aif_set2_adv_v1__{safeEmail}). Firestore is
  // the source of truth so results follow the user across browsers/devices;
  // localStorage remains a fallback when Firestore is unavailable.
  let _fsMod = null, _fsDb = null;
  async function fsInit() {
    if (_fsDb) return _fsDb;
    try {
      const app = (window.SFAuth && window.SFAuth.getApp) ? window.SFAuth.getApp() : null;
      if (!app) return null;
      _fsMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      _fsDb = _fsMod.getFirestore(app);
      return _fsDb;
    } catch (e) { console.log("[aifPrepResults] Firestore init failed:", e && e.message); return null; }
  }
  async function fsLoad(setKey) {
    try {
      const db = await fsInit(); if (!db) return null;
      const snap = await _fsMod.getDoc(_fsMod.doc(db, "aifPrepResults", setKey));
      if (snap.exists()) { console.log("[aifPrepResults] loaded from Firestore:", setKey); return snap.data(); }
      return null;
    } catch (e) { console.log("[aifPrepResults] Firestore load failed:", e && e.message); return null; }
  }
  async function fsSave(setKey, state, email) {
    try {
      const db = await fsInit(); if (!db) return;
      await _fsMod.setDoc(_fsMod.doc(db, "aifPrepResults", setKey), Object.assign({}, state, {
        email: email || "", setKey: setKey, updatedAt: Date.now()
      }));
      console.log("[aifPrepResults] saved to Firestore:", setKey);
    } catch (e) { console.log("[aifPrepResults] Firestore save failed:", e && e.message); }
  }
  async function fsClear(setKey) {
    try {
      const db = await fsInit(); if (!db) return;
      await _fsMod.deleteDoc(_fsMod.doc(db, "aifPrepResults", setKey));
      console.log("[aifPrepResults] cleared Firestore doc:", setKey);
    } catch (e) { console.log("[aifPrepResults] Firestore clear failed:", e && e.message); }
  }

  // Deterministic shuffle so a given attempt is reproducible per seed.
  function seededShuffle(arr, seed) {
    const a = arr.slice(); let s = seed || 1;
    for (let i = a.length - 1; i > 0; i--) {
      s = (s * 9301 + 49297) % 233280;
      const j = Math.floor((s / 233280) * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Build the question list for a given attempt number (1-based).
  function buildAttempt(bank, state, attemptNo) {
    const used = new Set((state.usedIds || []));
    const wrong = new Set((state.wrongIds || []));
    const withIdx = bank.map((q, i) => Object.assign({ _id: i }, q));

    let pool = withIdx.filter(q => !used.has(q._id));
    // If the unused pool can't fill an attempt, allow reuse (bank exhausted).
    if (pool.length < ATTEMPT_SIZE) pool = withIdx.slice();

    let ordered = seededShuffle(pool, attemptNo * 17 + 3);

    // Attempt 3+ : lead with previously-wrong questions.
    if (attemptNo >= 3) {
      const lead = ordered.filter(q => wrong.has(q._id));
      const rest = ordered.filter(q => !wrong.has(q._id));
      ordered = lead.concat(rest);
    }

    // Try to spread domains across the selection.
    const picked = [], seenDomainCount = {};
    for (const q of ordered) {
      if (picked.length >= ATTEMPT_SIZE) break;
      const dc = seenDomainCount[q.d] || 0;
      if (dc < 2 || picked.length >= ATTEMPT_SIZE - 2) {
        picked.push(q); seenDomainCount[q.d] = dc + 1;
      }
    }
    let idx = 0;
    while (picked.length < ATTEMPT_SIZE && idx < ordered.length) {
      if (!picked.includes(ordered[idx])) picked.push(ordered[idx]);
      idx++;
    }
    return picked.slice(0, ATTEMPT_SIZE);
  }

  function AifEval(opts) {
    const bank = opts.bank;
    const SET_KEY = opts.setKey;
    const mount = opts.mount;
    const title = opts.title;
    const subtitle = opts.subtitle;
    const email = opts.email || "";

    let state = loadState(SET_KEY);
    state.usedIds = state.usedIds || [];
    state.wrongIds = state.wrongIds || [];
    state.attemptNo = state.attemptNo || 0;
    state.history = state.history || []; // [{attempt, score, total, ts}]

    let current = null; // {questions, answers[], pos}

    // Firestore is source of truth: if a doc exists, adopt it and refresh
    // localStorage from it; otherwise keep the localStorage state we loaded.
    (async () => {
      const remote = await fsLoad(SET_KEY);
      if (remote && Array.isArray(remote.history)) {
        state.usedIds = remote.usedIds || [];
        state.wrongIds = remote.wrongIds || [];
        state.attemptNo = remote.attemptNo || 0;
        state.history = remote.history || [];
        persistState(SET_KEY, state);
        if (!current) renderStart();
      }
    })();

    function startAttempt() {
      if (state.attemptNo >= MAX_ATTEMPTS) { renderExhausted(); return; }
      const attemptNo = state.attemptNo + 1;
      // One attempt walks ALL bank questions, grouped into domain sections in
      // ascending domain order. Option order is shuffled per question each
      // attempt so retakes don't preserve the A/B/C/D sequence; the correct
      // index is remapped so correctness is preserved. Domain/question order
      // stays fixed.
      const questions = bank
        .map((q, i) => Object.assign({ _id: i }, q))
        .sort((a, b) => (a.d - b.d) || (a._id - b._id))
        .map((q) => {
          const idx = q.o.map((_, i) => i);
          for (let k = idx.length - 1; k > 0; k--) {
            const j = Math.floor(Math.random() * (k + 1));
            [idx[k], idx[j]] = [idx[j], idx[k]];
          }
          const shuffledO = idx.map(i => q.o[i]);
          const newA = idx.indexOf(q.a);
          return Object.assign({}, q, { o: shuffledO, a: newA });
        });
      current = { attemptNo, questions, answers: new Array(questions.length).fill(null), pos: 0 };
      renderQuestion();
    }

    function renderQuestion() {
      const q = current.questions[current.pos];
      const wasWrong = state.wrongIds.includes(q._id);
      const answered = current.answers[current.pos];
      // Domain section context
      const domainQs = current.questions.filter(x => x.d === q.d);
      const posInDomain = domainQs.findIndex(x => x._id === q._id) + 1;
      const domainNo = Array.from(new Set(current.questions.map(x => x.d))).sort((a,b)=>a-b).indexOf(q.d) + 1;
      const totalDomains = new Set(current.questions.map(x => x.d)).size;
      let html = "";
      html += `<div class="aif-topbar"><span>Attempt ${current.attemptNo} of ${MAX_ATTEMPTS} · Domain ${domainNo} of ${totalDomains}</span>`;
      html += `<span>Question ${posInDomain} of ${domainQs.length}</span></div>`;
      html += `<div class="aif-progress"><div class="aif-progress-fill" style="width:${((current.pos) / current.questions.length) * 100}%"></div></div>`;
      html += `<div class="aif-domain">${DOMAIN_NAMES[q.d]}</div>`;
      if (wasWrong) {
        html += `<div class="aif-annot">⚠ You answered this incorrectly on a previous attempt — read carefully.</div>`;
      }
      html += `<div class="aif-q">${q.q}</div>`;
      html += `<div class="aif-opts">`;
      q.o.forEach((opt, i) => {
        let cls = "aif-opt";
        if (answered !== null) {
          if (i === q.a) cls += " correct";
          else if (i === answered) cls += " wrong";
          cls += " locked";
        }
        html += `<button class="${cls}" data-i="${i}" ${answered !== null ? "disabled" : ""}>`;
        html += `<span class="aif-letter">${String.fromCharCode(65 + i)}</span>${opt}</button>`;
      });
      html += `</div>`;
      if (answered !== null) {
        const right = answered === q.a;
        html += `<div class="aif-expl ${right ? "ok" : "no"}">`;
        html += `<strong>${right ? "Correct." : "Not quite."}</strong> ${q.e}</div>`;
        const isLast = current.pos === current.questions.length - 1;
        const nextDifferentDomain = !isLast && current.questions[current.pos + 1].d !== q.d;
        let label = "Next question";
        if (isLast) label = "See results";
        else if (nextDifferentDomain) label = "Move to next domain";
        html += `<div class="aif-nav"><button class="aif-next" id="aif-next">${label}</button></div>`;
      }
      mount.innerHTML = html;

      mount.querySelectorAll(".aif-opt").forEach(btn => {
        btn.addEventListener("click", () => {
          if (current.answers[current.pos] !== null) return;
          const i = parseInt(btn.getAttribute("data-i"), 10);
          current.answers[current.pos] = i;
          if (i !== q.a && !state.wrongIds.includes(q._id)) state.wrongIds.push(q._id);
          if (i === q.a) state.wrongIds = state.wrongIds.filter(id => id !== q._id);
          renderQuestion();
        });
      });
      const next = mount.querySelector("#aif-next");
      if (next) next.addEventListener("click", () => {
        if (current.pos < current.questions.length - 1) { current.pos++; renderQuestion(); }
        else finishAttempt();
      });
    }

    function finishAttempt() {
      let score = 0;
      current.questions.forEach((q, i) => { if (current.answers[i] === q.a) score++; });
      current.questions.forEach(q => { if (!state.usedIds.includes(q._id)) state.usedIds.push(q._id); });
      state.attemptNo = current.attemptNo;
      state.history.push({ attempt: current.attemptNo, score, total: current.questions.length, ts: Date.now() });
      persistState(SET_KEY, state);
      fsSave(SET_KEY, state, email);
      renderResults(score, current.questions.length);
    }

    function renderResults(score, total) {
      const pct = Math.round((score / total) * 100);
      // Domain breakdown for this attempt
      const dTotals = {}, dRight = {};
      current.questions.forEach((q, i) => {
        dTotals[q.d] = (dTotals[q.d] || 0) + 1;
        if (current.answers[i] === q.a) dRight[q.d] = (dRight[q.d] || 0) + 1;
      });
      let html = `<div class="aif-result"><div class="aif-score">${score}/${total}</div>`;
      html += `<div class="aif-pct">${pct}%</div>`;
      html += `<div class="aif-verdict">${pct >= 70 ? "On track — 70%+ suggests readiness on this set." : "Keep practicing — aim for 70%+ before exam day."}</div>`;
      html += `<div class="aif-break"><div class="aif-break-title">By domain (this attempt)</div>`;
      Object.keys(dTotals).sort().forEach(d => {
        const r = dRight[d] || 0, t = dTotals[d];
        html += `<div class="aif-break-row"><span>${DOMAIN_NAMES[d]}</span><span>${r}/${t}</span></div>`;
      });
      html += `</div>`;
      if (state.attemptNo < MAX_ATTEMPTS) {
        html += `<button class="aif-next" id="aif-again">Start attempt ${state.attemptNo + 1}</button>`;
      } else {
        html += `<div class="aif-verdict">All ${MAX_ATTEMPTS} attempts complete.</div>`;
      }
      html += `<button class="aif-reset" id="aif-reset">Reset all progress</button></div>`;
      mount.innerHTML = html;
      const again = mount.querySelector("#aif-again");
      if (again) again.addEventListener("click", startAttempt);
      mount.querySelector("#aif-reset").addEventListener("click", () => {
        localStorage.removeItem(SET_KEY);
        fsClear(SET_KEY);
        state = { usedIds: [], wrongIds: [], attemptNo: 0, history: [] };
        renderStart();
      });
    }

    function renderExhausted() { renderResults(0, ATTEMPT_SIZE); }

    function renderStart() {
      let html = `<div class="aif-start"><h1>${title}</h1><p class="aif-sub">${subtitle}</p>`;
      html += `<ul class="aif-meta"><li>${MAX_ATTEMPTS} attempts · all questions across five domain sections</li>`;
      html += `<li>One section per AIF-C01 domain, in order</li>`;
      html += `<li>Full explanation after every question</li></ul>`;
      if (state.history.length) {
        html += `<div class="aif-break"><div class="aif-break-title">Your attempts so far</div>`;
        state.history.forEach(h => {
          html += `<div class="aif-break-row"><span>Attempt ${h.attempt}</span><span>${h.score}/${h.total}</span></div>`;
        });
        html += `</div>`;
      }
      const label = state.attemptNo >= MAX_ATTEMPTS ? "All attempts used"
        : state.attemptNo > 0 ? `Start attempt ${state.attemptNo + 1}` : "Start attempt 1";
      html += `<button class="aif-next" id="aif-begin" ${state.attemptNo >= MAX_ATTEMPTS ? "disabled" : ""}>${label}</button>`;
      if (state.attemptNo > 0) html += `<button class="aif-reset" id="aif-reset2">Reset all progress</button>`;
      html += `</div>`;
      mount.innerHTML = html;
      const begin = mount.querySelector("#aif-begin");
      if (begin) begin.addEventListener("click", startAttempt);
      const r2 = mount.querySelector("#aif-reset2");
      if (r2) r2.addEventListener("click", () => {
        localStorage.removeItem(SET_KEY);
        fsClear(SET_KEY);
        state = { usedIds: [], wrongIds: [], attemptNo: 0, history: [] };
        renderStart();
      });
    }

    renderStart();
  }

  window.AifEval = AifEval;
})();
</script>
<script>/* SF auth gate — Google SSO (hd: sourcefuse.com) + email/password fallback.
   Reuses the sfcertification-grafana Firebase project. Firebase v10 modular SDK
   loaded via CDN in the page. Exposes window.SFAuth.mount(onReady) which shows
   the overlay and calls onReady(email) once a valid @sourcefuse.com user is in.
   NOTE: paste the real sfcertification-grafana firebaseConfig values below —
   left as clearly-marked placeholders per the golden rule (never invent config). */
(function () {
  const firebaseConfig = {
    apiKey: "AIzaSyC-I-IOCq2fCwa471fsD5xOn6SYQSBDp7Q",
    authDomain: "sfcertification-grafana.firebaseapp.com",
    projectId: "sfcertification-grafana",
    storageBucket: "sfcertification-grafana.firebasestorage.app",
    messagingSenderId: "227322696511",
    appId: "1:227322696511:web:12e7ced7dd3d45fa06798a"
  };
  const ALLOWED_DOMAIN = "sourcefuse.com";
  const ALLOWED_EXTRA = ["ravjv2013@gmail.com"];  // TEST ONLY — remove after testing

  let app, auth, GoogleProvider, signInRedirect, getRedirect, signInEmail, onAuth, signOutFn;
  let readyCb = null;

  async function initFirebase() {
    const appMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const authMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
    // Reuse default app if the host page already initialized it.
    app = appMod.getApps().length ? appMod.getApp() : appMod.initializeApp(firebaseConfig);
    auth = authMod.getAuth(app);
    GoogleProvider = authMod.GoogleAuthProvider;
    signInRedirect = (p) => authMod.signInWithRedirect(auth, p);
    getRedirect = () => authMod.getRedirectResult(auth);
    signInEmail = (e, pw) => authMod.signInWithEmailAndPassword(auth, e, pw);
    onAuth = (cb) => authMod.onAuthStateChanged(auth, cb);
    signOutFn = () => authMod.signOut(auth);
  }

  function overlayHTML() {
    return `
    <div class="sf-auth-backdrop" id="sf-auth">
      <div class="sf-auth-card">
        <div class="sf-auth-badge">SF Knowledge Hub</div>
        <h2>Sign in to start</h2>
        <p class="sf-auth-sub">Use your SourceFuse account to save your attempts.</p>
        <button class="sf-google" id="sf-google">
          <span class="sf-g">G</span> Sign in with Google
        </button>
        <div class="sf-or"><span>or</span></div>
        <label class="sf-lbl">Email</label>
        <input class="sf-inp" id="sf-email" type="email" placeholder="you@sourcefuse.com" autocomplete="username">
        <label class="sf-lbl">Password</label>
        <input class="sf-inp" id="sf-pass" type="password" placeholder="••••••••" autocomplete="current-password">
        <button class="sf-signin" id="sf-signin">Sign in</button>
        <div class="sf-err" id="sf-err"></div>
      </div>
    </div>`;
  }

  function styleTag() {
    return `<style>
    .sf-auth-backdrop{position:fixed;inset:0;background:rgba(16,38,60,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
    .sf-auth-card{background:#fff;border-radius:16px;padding:30px 28px;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(10,30,55,.25);font-family:inherit}
    .sf-auth-badge{display:inline-block;background:var(--blue,#1a6eb5);color:#fff;font-weight:700;font-size:12px;padding:4px 11px;border-radius:14px;margin-bottom:14px}
    .sf-auth-card h2{margin:0 0 4px;font-size:20px;color:#1a2733}
    .sf-auth-sub{margin:0 0 20px;color:#5a6b7a;font-size:14px}
    .sf-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:1.5px solid #dbe3ec;border-radius:10px;padding:12px;font-size:15px;font-weight:600;color:#1a2733;cursor:pointer;font-family:inherit}
    .sf-google:hover{background:#f7fbff;border-color:var(--blue,#1a6eb5)}
    .sf-g{background:conic-gradient(from -45deg,#ea4335 0 25%,#fbbc05 0 50%,#34a853 0 75%,#4285f4 0);color:#fff;font-weight:800;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
    .sf-or{display:flex;align-items:center;text-align:center;color:#93a1af;font-size:12px;margin:18px 0}
    .sf-or::before,.sf-or::after{content:"";flex:1;height:1px;background:#e2e8ef}
    .sf-or span{padding:0 12px}
    .sf-lbl{display:block;font-size:12.5px;font-weight:600;color:#5a6b7a;margin-bottom:5px}
    .sf-inp{width:100%;border:1.5px solid #dbe3ec;border-radius:9px;padding:11px 12px;font-size:14.5px;margin-bottom:14px;font-family:inherit}
    .sf-inp:focus{outline:none;border-color:var(--blue,#1a6eb5)}
    .sf-signin{width:100%;background:var(--blue,#1a6eb5);color:#fff;border:0;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .sf-signin:hover{background:var(--blue-d,#12507f)}
    .sf-err{color:#b5341a;font-size:13px;margin-top:12px;min-height:16px}
    </style>`;
  }

  function fail(msg) { const e = document.getElementById("sf-err"); if (e) e.textContent = msg; }

  function validDomain(email) {
    if (typeof email !== "string") return false;
    const e = email.toLowerCase();
    return e.endsWith("@" + ALLOWED_DOMAIN) || ALLOWED_EXTRA.includes(e);
  }

  function proceed(email) {
    const el = document.getElementById("sf-auth");
    if (el) el.remove();
    if (readyCb) readyCb(email);
  }

  async function wireOverlay() {
    document.getElementById("sf-google").addEventListener("click", async () => {
      fail("");
      if (!signInRedirect) return fail("Auth service not ready — Google SSO needs the deployed https host. Use email/password below.");
      try {
        const provider = new GoogleProvider();
        provider.setCustomParameters({ hd: ALLOWED_DOMAIN, prompt: "select_account" });
        // Redirect leaves the page and returns to it; result is picked up on load
        // by handleRedirectResult(). This works inside the LMS iframe, unlike popup.
        await signInRedirect(provider);
      } catch (err) {
        fail("Google sign-in couldn't start. Use email/password below.");
      }
    });
    document.getElementById("sf-signin").addEventListener("click", async () => {
      fail("");
      const email = (document.getElementById("sf-email").value || "").trim();
      const pass = document.getElementById("sf-pass").value || "";
      if (!validDomain(email)) return fail("Email must be an @sourcefuse.com address.");
      if (!pass) return fail("Enter your password.");
      try {
        const res = await signInEmail(email, pass);
        const e = (res.user && res.user.email) || email;
        proceed(e);
      } catch (err) { fail("Incorrect email or password."); }
    });
  }

  async function mount(onReady) {
    readyCb = onReady;
    document.head.insertAdjacentHTML("beforeend", styleTag());
    document.body.insertAdjacentHTML("beforeend", overlayHTML());
    try {
      await initFirebase();
    } catch (e) {
      // If Firebase can't load (e.g. local file://), keep overlay but let email/password
      // at least validate domain so the page is testable; real auth needs https host.
      fail("Auth service loading… (Google SSO needs the deployed https host).");
    }
    // Handle the return leg of signInWithRedirect: when the user comes back from
    // Google, getRedirectResult() resolves with their credential.
    if (getRedirect) {
      try {
        const res = await getRedirect();
        if (res && res.user) {
          const email = res.user.email;
          if (!validDomain(email)) { await signOutFn(); fail("Please use your @sourcefuse.com account."); }
          else { proceed(email); return; }
        }
      } catch (err) {
        fail("Google sign-in didn't complete. Try again or use email/password.");
      }
    }
    // If a session already exists (redirect just completed, or prior session), skip the overlay.
    if (onAuth) {
      onAuth((user) => {
        if (user && validDomain(user.email)) proceed(user.email);
      });
    }
    wireOverlay();
  }

  window.SFAuth = { mount, getApp: () => app };
})();
</script>
